name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Generate sample report
        run: npm run generate-sample

      - name: Verify sample output
        run: |
          test -f _report/index.html
          test -f _report/all-tests.html
          test -f _report/tests.json
          test -f dist/index.js

      - name: Upload sample report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-report
          path: _report/
          retention-days: 7
