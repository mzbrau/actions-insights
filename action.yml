name: Actions Insights Test Report
description: Test reports for Actions — Show test results in PR comments, workflows, HTML artifacts and test history repos.
author: mzbrau
branding:
  icon: activity
  color: green
inputs:
  # Test results
  test-results:
    description: Glob pattern for test result files (TRX, JUnit, NUnit, xUnit)
    required: false
    default: '**/*.{trx,xml}'

  # Reporting / artifact
  reports-subdirectory:
    description: Subdirectory within the site artifact for test reports
    required: false
    default: test-reports
  report-title:
    description: Title displayed in the report UI
    required: false
    default: Actions Insights
  report-output:
    description: Local directory for generated report files
    required: false
    default: _report
  site-output:
    description: Local directory for merged site with report history
    required: false
    default: _site
  upload-html-report:
    description: Upload a responsive HTML report with multi-run history as a workflow artifact
    required: false
    default: 'true'
  artifact-retention-days:
    description: Retention days for the uploaded HTML report artifact
    required: false
    default: '30'
  include-raw-test-results:
    description: Include original test result files in the workflow artifact under raw/
    required: false
    default: 'true'

  # PR comment
  comment-mode:
    description: 'PR comment mode: update (upsert single comment) or off. Only applies in pull-request workflow runs.'
    required: false
    default: update
  max-failed-tests-in-comment:
    description: Maximum failed tests to show in the PR comment
    required: false
    default: '10'
  max-stack-trace-lines:
    description: Maximum stack trace lines before truncation
    required: false
    default: '25'
  include-stdout:
    description: Include stdout in failure details
    required: false
    default: 'true'
  include-stderr:
    description: Include stderr in failure details
    required: false
    default: 'true'
  include-slowest-tests:
    description: Number of slowest tests to include (0 to disable)
    required: false
    default: '18'

  # Job summary
  generate-job-summary:
    description: Write a TeamCity-style summary table to the GitHub Actions job summary
    required: false
    default: 'true'
  max-failed-tests-in-summary:
    description: Maximum failed tests to show in the job summary
    required: false
    default: '20'

  # Checks
  publish-checks:
    description: Publish a GitHub check run with test results and file annotations from stack traces
    required: false
    default: 'true'
  check-name:
    description: Name of the published check run
    required: false
    default: Actions Insights

  # Display
  theme:
    description: 'Default theme: light, dark, or auto'
    required: false
    default: auto
  slow-test-threshold-ms:
    description: Duration threshold in ms for marking tests as slow
    required: false
    default: '1000'

  # History (artifact cache)
  history:
    description: Maximum number of historical runs to retain per branch/PR in the HTML artifact (merged via Actions cache)
    required: false
    default: '20'
  retain-days:
    description: Maximum age in days for historical runs in the HTML artifact
    required: false
    default: '30'

  # History repository (optional)
  history-enabled:
    description: Publish test run JSON to a persistent history repository for the GitHub Pages React dashboard
    required: false
    default: 'false'
  history-repository:
    description: 'History repository (owner/repo) to publish JSON data to'
    required: false
    default: ''
  history-token:
    description: Token with contents write access to the history repository
    required: false
    default: ''
  history-pages-url:
    description: Base URL for the history dashboard (GitHub Pages). If unset, Actions Insights will try to discover it or fall back to https://{owner}.github.io/{repo}/.
    required: false
    default: ''
  history-branch:
    description: Branch in the history repository to publish to
    required: false
    default: main
  history-path:
    description: Root data path inside the history repository
    required: false
    default: data
  history-repository-name:
    description: 'Source repository key (auto uses GITHUB_REPOSITORY)'
    required: false
    default: auto
  history-mode:
    description: 'History mode (multi only in v1)'
    required: false
    default: multi
  history-default-repository:
    description: Default repository for the history dashboard config.json
    required: false
    default: ''

  # Authentication
  github-token:
    description: GitHub token for API calls
    required: false
    default: ${{ github.token }}
outputs:
  workflow-url:
    description: URL to the workflow run
  artifact-url:
    description: URL to the uploaded HTML report artifact (when upload-html-report is enabled)
  status:
    description: Overall test status (passed or failed)
  total:
    description: Total number of tests
  passed:
    description: Number of passed tests
  failed:
    description: Number of failed tests
  skipped:
    description: Number of skipped tests
runs:
  using: node20
  main: dist/index.js
