name: Actions Insights Test Report
description: GitHub-native test reports for Actions — parse TRX, JUnit, NUnit, xUnit with rich PR comments, job summaries, checks, and HTML artifacts.
author: mzbrau
branding:
  icon: check-circle
  color: blue
inputs:
  test-results:
    description: Glob pattern for test result files
    required: false
    default: '**/*.{trx,xml}'
  reports-subdirectory:
    description: Subdirectory within the site artifact for test reports
    required: false
    default: test-reports
  pages-subdirectory:
    description: 'Deprecated: use reports-subdirectory'
    required: false
    default: ''
  comment-mode:
    description: 'PR comment mode: update (upsert) or off'
    required: false
    default: update
  comment-pr:
    description: 'Deprecated: use comment-mode instead'
    required: false
    default: 'true'
  history:
    description: Maximum number of historical run reports to retain per branch/PR
    required: false
    default: '20'
  retain-days:
    description: Maximum age in days for historical run reports
    required: false
    default: '30'
  report-title:
    description: Title displayed in the report UI
    required: false
    default: Actions Insights
  report-output:
    description: Local directory for generated report files
    required: false
    default: _report
  site-output:
    description: Local directory for merged site with report history
    required: false
    default: _site
  theme:
    description: 'Default theme: light, dark, or auto'
    required: false
    default: auto
  slow-test-threshold-ms:
    description: Duration threshold in ms for marking tests as slow
    required: false
    default: '1000'
  max-failed-tests-in-comment:
    description: Maximum failed tests to show in the PR comment
    required: false
    default: '10'
  max-failed-tests-in-summary:
    description: Maximum failed tests to show in the job summary
    required: false
    default: '20'
  max-stack-trace-lines:
    description: Maximum stack trace lines before truncation
    required: false
    default: '25'
  include-stdout:
    description: Include stdout in failure details
    required: false
    default: 'true'
  include-stderr:
    description: Include stderr in failure details
    required: false
    default: 'true'
  include-slowest-tests:
    description: Number of slowest tests to include (0 to disable)
    required: false
    default: '10'
  upload-html-report:
    description: Upload HTML report as a workflow artifact
    required: false
    default: 'true'
  generate-job-summary:
    description: Write a GitHub Actions job summary
    required: false
    default: 'true'
  publish-checks:
    description: Publish a GitHub check run with test results
    required: false
    default: 'true'
  artifact-retention-days:
    description: Retention days for the uploaded HTML report artifact
    required: false
    default: '30'
  check-name:
    description: Name of the published check run
    required: false
    default: Actions Insights
  publish-pages:
    description: 'Deprecated: ignored'
    required: false
    default: ''
  pages-mode:
    description: 'Deprecated: ignored'
    required: false
    default: ''
  seed-from-gh-pages:
    description: 'Deprecated: ignored'
    required: false
    default: 'false'
  github-token:
    description: GitHub token for API calls
    required: false
    default: ${{ github.token }}
outputs:
  workflow-url:
    description: URL to the workflow run
  artifact-url:
    description: URL to the workflow run artifacts
  status:
    description: Overall test status (passed or failed)
  total:
    description: Total number of tests
  passed:
    description: Number of passed tests
  failed:
    description: Number of failed tests
  skipped:
    description: Number of skipped tests
runs:
  using: node20
  main: dist/index.js
