# Example: Java JUnit test reports
# Copy relevant sections into your workflow.

name: Example Java Test Reports

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test
        run: mvn test

      - name: Actions Insights
        uses: mzbrau/actions-insights@v1
        with:
          test-results: '**/TEST-*.xml'
