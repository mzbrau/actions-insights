# Example: Python JUnit test reports
# Copy relevant sections into your workflow.

name: Example Python Test Reports

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test
        run: pytest --junitxml=test-results.xml

      - name: Actions Insights
        uses: mzbrau/actions-insights@v1
        with:
          test-results: 'test-results.xml'
