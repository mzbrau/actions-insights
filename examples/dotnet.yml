# Example: .NET TRX test reports
# Copy relevant sections into your workflow.

name: Example .NET Test Reports

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./coverage --logger "trx;LogFileName=results.trx"

      - name: Actions Insights
        uses: ./
        with:
          test-results: '**/*.trx'
          coverage-enabled: true
          coverage-files: '**/coverage.cobertura.xml'
          reports-subdirectory: test-reports
